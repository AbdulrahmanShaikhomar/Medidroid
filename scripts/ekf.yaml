### MediDroid EKF (robot_localization) — fuse rf2o translation + MPU9255 yaw-rate.
### Heading (yaw) comes from the IMU gyro-Z, which (unlike rf2o) is NOT blind to
### in-place rotation. rf2o supplies X/Y translation only. Output: odom->base_link
### TF + /odometry/filtered. two_d_mode zeroes z/roll/pitch for a planar robot.
ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom            # EKF publishes odom->base_link

    # --- rf2o laser odometry: position X,Y only (its yaw is unreliable in rotation) ---
    odom0: /odom
    odom0_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: true
    odom0_relative: false
    odom0_queue_size: 10
    odom0_nodelay: true

    # --- MPU9255 IMU: yaw RATE (gyro Z) only; orientation cov=-1 so it's ignored ---
    imu0: /imu/data_raw
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 10
    imu0_nodelay: true
    imu0_remove_gravitational_acceleration: true
